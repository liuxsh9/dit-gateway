services:
  caddy:
    image: caddy:2
    profiles: ["tls"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: "${DOMAIN:-localhost}"
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    environment:
      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: db:5432
      FORGEJO__database__NAME: forgejo
      FORGEJO__database__USER: forgejo
      FORGEJO__database__PASSWD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}"
      FORGEJO__i18n__LANGS: en-US
      FORGEJO__i18n__NAMES: English
      FORGEJO__service__DISABLE_REGISTRATION: "${DISABLE_REGISTRATION:-true}"
      FORGEJO__datahub__ENABLED: "true"
      FORGEJO__datahub__CORE_URL: "http://core:8000"
      FORGEJO__datahub__SERVICE_TOKEN: "${SERVICE_TOKEN:?set SERVICE_TOKEN in .env}"
    depends_on:
      db:
        condition: service_healthy
      core:
        condition: service_healthy
    volumes:
      - forgejo-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  core:
    image: ${CORE_IMAGE:-ghcr.io/liuxsh9/dit-core:latest}
    expose:
      - "8000"
    environment:
      DIT_SERVER_DATABASE_URL: "postgresql+asyncpg://dit:${DIT_DB_PASSWORD:?set DIT_DB_PASSWORD in .env}@db:5432/dit"
      DIT_SERVER_DATA_DIR: "/data/dit"
      DIT_SERVER_SERVICE_TOKEN: "${SERVICE_TOKEN:?set SERVICE_TOKEN in .env}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - core-data:/data/dit
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: forgejo
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}"
      POSTGRES_DB: forgejo
      DIT_DB_PASSWORD: "${DIT_DB_PASSWORD:?set DIT_DB_PASSWORD in .env}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgejo"]
      interval: 5s
      timeout: 3s
      retries: 3
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
  forgejo-data:
  core-data:
  pg-data:
